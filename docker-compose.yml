services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: botox_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: botox
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/infrastructure/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      # 5433 (my mac) : 5432 (inside container) — avoids conflict with local Postgres
      # pgAdmin: host=localhost, port=5433
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botox_user -d botox"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      USE_SANDBOX: ${USE_SANDBOX}
      # "db" is the hostname of the Postgres container (= service name above)
      # From my debug config, use localhost:5433 instead
      DATABASE_URL: postgresql://botox_user:${DB_PASSWORD}@db:5432/botox
      BINANCE_API_KEY_SANDBOX: ${BINANCE_API_KEY_SANDBOX}
      BINANCE_API_SECRET_SANDBOX: ${BINANCE_API_SECRET_SANDBOX}
      LOG_DIR: /app/logs
    volumes:
      # Logs are written here inside the container and stored on the host at ./logs/
      - ./logs:/app/logs
    ports:
      # 8001 (my mac) : 8000 (inside container) — avoids conflict with local debug server on 8000
      - "8001:8000"

  backup:
    build:
      context: ./backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: botox_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: botox
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      # Daily pg_dump files stored on host at ./backups/, kept for 30 days
      - ./backups:/backups

volumes:
  postgres_data: